name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual trigger from GitHub UI
    inputs:
      authDisabled:
        description: "Set to true to enable demo auth mode (skip login gate)"
        required: false
        default: "false"
      oauthOnly:
        description: "Set to true to show only Quran.com OAuth sign-in on /auth (web)"
        required: false
        default: "false"

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          timeout: 60s
          command_timeout: 18m
          script: |
            # Store secrets as local variables
            CLIENT_ID='${{ secrets.QURAN_FOUNDATION_CLIENT_ID }}'
            CLIENT_SECRET='${{ secrets.QURAN_FOUNDATION_CLIENT_SECRET }}'
            AUTH_TOKEN='${{ secrets.QURAN_FOUNDATION_AUTH_TOKEN }}'
            OAUTH_BASE_URL='${{ secrets.QURAN_FOUNDATION_OAUTH_BASE_URL }}'
            USER_API_URL='${{ secrets.QURAN_FOUNDATION_USER_API_URL }}'
            OAUTH_REDIRECT_URI='${{ secrets.QURAN_FOUNDATION_OAUTH_REDIRECT_URI }}'
            OAUTH_SUCCESS_REDIRECT='${{ secrets.QURAN_FOUNDATION_OAUTH_SUCCESS_REDIRECT }}'
            OAUTH_SCOPE='${{ secrets.QURAN_FOUNDATION_OAUTH_SCOPE }}'
            AUTH_DISABLED_FLAG="${{ github.event.inputs.authDisabled || secrets.AUTH_DISABLED_FLAG || 'false' }}"
            OAUTH_ONLY_FLAG="${{ github.event.inputs.oauthOnly || secrets.OAUTH_ONLY_FLAG || 'false' }}"
            
            set -eu

            # ── Find repo directory ────────────────────────────────
            REPO_DIR=""
            for candidate in /root/imanifestapp /root/Imanifestapp /home/imanifestapp /var/www/imanifestapp /opt/imanifestapp; do
              if [ -f "$candidate/docker-compose.yml" ]; then
                REPO_DIR="$candidate"
                break
              fi
            done

            if [ -z "$REPO_DIR" ]; then
              # Try to find by docker-compose.yml anywhere under /root or /home
              REPO_DIR=$(find /root /home /opt /var/www -maxdepth 3 -name "docker-compose.yml" 2>/dev/null | head -1 | xargs dirname 2>/dev/null || true)
            fi

            if [ -z "$REPO_DIR" ]; then
              echo "ERROR: Cannot find repo with docker-compose.yml. Cloning fresh..."
              git clone https://github.com/mentari92/Imanifestapp.git /root/imanifestapp
              REPO_DIR="/root/imanifestapp"
            fi

            echo "=== Using repo at: $REPO_DIR ==="
            cd "$REPO_DIR"

            # ── Pull latest code ───────────────────────────────────
            echo "=== Pulling latest code ==="
            git fetch origin main
            git reset --hard origin/main

            # ── Upsert Quran Foundation vars into compose .env ──────
            echo "=== Upserting Quran Foundation vars into $REPO_DIR/.env ==="
            ENV_FILE="$REPO_DIR/.env"
            touch "$ENV_FILE"

            upsert_env() {
              key="$1"
              value="$2"
              escaped_value=$(printf '%s' "$value" | sed 's/[\\&]/\\\\&/g')
              if grep -q "^${key}=" "$ENV_FILE"; then
                sed -i.bak "s|^${key}=.*|${key}=${escaped_value}|" "$ENV_FILE"
              else
                printf '%s=%s\n' "$key" "$value" >> "$ENV_FILE"
              fi
            }

            upsert_env "QURAN_FOUNDATION_CLIENT_ID" "$CLIENT_ID"
            upsert_env "QURAN_FOUNDATION_CLIENT_SECRET" "$CLIENT_SECRET"
            if [ -n "$OAUTH_BASE_URL" ]; then
              upsert_env "QURAN_FOUNDATION_OAUTH_BASE_URL" "$OAUTH_BASE_URL"
            else
              upsert_env "QURAN_FOUNDATION_OAUTH_BASE_URL" "https://oauth2.quran.foundation"
            fi
            if [ -n "$USER_API_URL" ]; then
              upsert_env "QURAN_FOUNDATION_USER_API_URL" "$USER_API_URL"
            fi
            if [ -n "$OAUTH_REDIRECT_URI" ]; then
              upsert_env "QURAN_FOUNDATION_OAUTH_REDIRECT_URI" "$OAUTH_REDIRECT_URI"
            else
              upsert_env "QURAN_FOUNDATION_OAUTH_REDIRECT_URI" "https://imanifestapp.com/api/auth/oauth/callback"
            fi
            if [ -n "$OAUTH_SUCCESS_REDIRECT" ]; then
              upsert_env "QURAN_FOUNDATION_OAUTH_SUCCESS_REDIRECT" "$OAUTH_SUCCESS_REDIRECT"
            else
              upsert_env "QURAN_FOUNDATION_OAUTH_SUCCESS_REDIRECT" "https://imanifestapp.com/auth"
            fi
            if [ -n "$OAUTH_SCOPE" ]; then
              upsert_env "QURAN_FOUNDATION_OAUTH_SCOPE" "$OAUTH_SCOPE"
            else
              upsert_env "QURAN_FOUNDATION_OAUTH_SCOPE" "content user"
            fi
            upsert_env "QURAN_FOUNDATION_AUTH_TOKEN" "$AUTH_TOKEN"
            upsert_env "DEMO_AUTH_FALLBACK_ENABLED" "true"
            upsert_env "AUTH_DISABLED" "$AUTH_DISABLED_FLAG"
            upsert_env "EXPO_PUBLIC_DEMO_AUTH_MODE" "$AUTH_DISABLED_FLAG"
            upsert_env "EXPO_PUBLIC_OAUTH_ONLY" "$OAUTH_ONLY_FLAG"

            # Build a safe DATABASE_URL with URL-encoded credentials so special
            # chars in username/password (e.g. @, :, /) don't break parsing.
            POSTGRES_USER_VALUE=$(grep -E '^POSTGRES_USER=' "$ENV_FILE" | tail -1 | cut -d= -f2-)
            POSTGRES_DB_VALUE=$(grep -E '^POSTGRES_DB=' "$ENV_FILE" | tail -1 | cut -d= -f2-)
            POSTGRES_PASSWORD_VALUE=$(grep -E '^POSTGRES_PASSWORD=' "$ENV_FILE" | tail -1 | cut -d= -f2-)

            [ -n "$POSTGRES_USER_VALUE" ] || POSTGRES_USER_VALUE="imanifest"
            [ -n "$POSTGRES_DB_VALUE" ] || POSTGRES_DB_VALUE="imanifest"

            if [ -z "$POSTGRES_PASSWORD_VALUE" ]; then
              echo "ERROR: POSTGRES_PASSWORD is missing in $ENV_FILE"
              exit 1
            fi

            EXISTING_DATABASE_URL=$(grep -E '^DATABASE_URL=' "$ENV_FILE" | tail -1 | cut -d= -f2-)
            if [ -z "$EXISTING_DATABASE_URL" ] || ! echo "$EXISTING_DATABASE_URL" | grep -q '@db:5432'; then
              ENCODED_USER=$(node -p "encodeURIComponent(process.argv[1])" "$POSTGRES_USER_VALUE")
              ENCODED_PASSWORD=$(node -p "encodeURIComponent(process.argv[1])" "$POSTGRES_PASSWORD_VALUE")
              DATABASE_URL_VALUE="postgresql://${ENCODED_USER}:${ENCODED_PASSWORD}@db:5432/${POSTGRES_DB_VALUE}?schema=public"
              upsert_env "DATABASE_URL" "$DATABASE_URL_VALUE"
              echo "=== DATABASE_URL repaired/initialized ==="
            else
              echo "=== Keeping existing DATABASE_URL from .env ==="
            fi

            echo "=== .env updated ==="
            grep -E '^QURAN_FOUNDATION_(CLIENT_ID|CLIENT_SECRET|OAUTH_BASE_URL|OAUTH_REDIRECT_URI|OAUTH_SUCCESS_REDIRECT|OAUTH_SCOPE|AUTH_TOKEN)=' "$ENV_FILE" | sed 's/=.*$/=<set>/'
            grep -E '^DATABASE_URL=' "$ENV_FILE" | sed 's/=.*$/=<set>/'

            # ── Ensure stateful services are up first ───────────────
            echo "=== Ensuring db and redis are running ==="
            docker compose up -d db redis

            # ── Keep DB role password in sync with env config ───────
            # This fixes auth drift when a persistent Postgres volume keeps an
            # older password while .env was updated later.
            echo "=== Synchronizing database role password ==="
            docker compose exec -T -e PGPASSWORD="$POSTGRES_PASSWORD_VALUE" db psql -w -U "$POSTGRES_USER_VALUE" -d postgres \
              -v ON_ERROR_STOP=1 \
              -v role_name="$POSTGRES_USER_VALUE" \
              -v role_password="$POSTGRES_PASSWORD_VALUE" \
              -c "ALTER ROLE :\"role_name\" WITH LOGIN PASSWORD :'role_password';" || true

            # ── Rebuild API + Web containers ───────────────────────
            echo "=== Rebuilding containers ==="
            docker compose build api web

            echo "=== Restarting containers ==="
            echo "=== Cleaning conflicting stale containers (api/web) ==="
            for svc in api web; do
              docker ps -a --filter "name=^/imanifestapp-${svc}-1$" --format '{{.ID}}' | xargs -r docker rm -f || true
              docker ps -a --filter "name=_imanifestapp-${svc}-1$" --format '{{.ID}}' | xargs -r docker rm -f || true
            done

            echo "=== Recreating api/web containers ==="
            docker compose up -d --force-recreate --remove-orphans api web

            # ── Wait for startup ───────────────────────────────────
            echo "=== Waiting 10s for containers to start ==="
            sleep 10

            # ── Reconnect web to n8n network ───────────────────────
            WEB_ID=$(docker compose ps -q web 2>/dev/null || true)
            if [ -n "$WEB_ID" ]; then
              docker network connect --alias imanifest-web n8n_default "$WEB_ID" 2>/dev/null && \
                echo "=== Connected web to n8n_default ===" || \
                echo "=== (n8n_default network not found, skipping) ==="
            fi

            echo "=== Deploy complete ==="
            docker compose ps

            # ── API health check with retry (avoids false-fail on cold start) ──
            echo "=== Checking API health with retry ==="
            HEALTH_CODE="000"
            ATTEMPT=1
            MAX_ATTEMPTS=10
            while [ "$ATTEMPT" -le "$MAX_ATTEMPTS" ]; do
              HEALTH_CODE=$(curl -sS -o /tmp/health.out -w "%{http_code}" http://localhost:3001/health || true)
              if [ "$HEALTH_CODE" = "200" ]; then
                echo "=== Health check passed on attempt $ATTEMPT ==="
                cat /tmp/health.out
                break
              fi

              echo "=== Health check attempt $ATTEMPT/$MAX_ATTEMPTS failed (code=$HEALTH_CODE), retrying in 3s ==="
              ATTEMPT=$((ATTEMPT + 1))
              sleep 3
            done

            if [ "$HEALTH_CODE" != "200" ]; then
              echo "ERROR: API health check failed after retries"
              docker compose ps
              docker compose logs --tail=120 api || true
              exit 1
            fi

            # ── Public API health check + diagnostics (captures reverse-proxy issues) ──
            echo "=== Checking public API health with retry ==="
            PUBLIC_API_URL="https://api.imanifestapp.com/health"
            PUBLIC_CODE="000"
            PUBLIC_ATTEMPT=1
            PUBLIC_MAX_ATTEMPTS=8
            while [ "$PUBLIC_ATTEMPT" -le "$PUBLIC_MAX_ATTEMPTS" ]; do
              PUBLIC_CODE=$(curl -sS -o /tmp/public-health.out -w "%{http_code}" "$PUBLIC_API_URL" || true)
              if [ "$PUBLIC_CODE" = "200" ]; then
                echo "=== Public health check passed on attempt $PUBLIC_ATTEMPT ==="
                cat /tmp/public-health.out
                break
              fi

              echo "=== Public health attempt $PUBLIC_ATTEMPT/$PUBLIC_MAX_ATTEMPTS failed (code=$PUBLIC_CODE), retrying in 5s ==="
              PUBLIC_ATTEMPT=$((PUBLIC_ATTEMPT + 1))
              sleep 5
            done

            if [ "$PUBLIC_CODE" != "200" ]; then
              echo "WARNING: Public API health check returned $PUBLIC_CODE (Cloudflare/nginx routing may need attention)"
              echo "=== Diagnostic: docker compose ps ==="
              docker compose ps || true

              echo "=== Diagnostic: local API health from host ==="
              curl -sS -i -m 10 http://127.0.0.1:3001/health || true

              echo "=== Diagnostic: public API health verbose ==="
              curl -sS -i -m 15 "$PUBLIC_API_URL" || true

              echo "=== Diagnostic: DNS resolve for api.imanifestapp.com ==="
              getent hosts api.imanifestapp.com || true

              echo "=== Diagnostic: listening ports (80/443/3001/8080) ==="
              (ss -lntp 2>/dev/null || netstat -lntp 2>/dev/null || true) | grep -E ":80|:443|:3001|:8080" || true

              echo "=== NOTE: Containers are healthy (local check passed). Public routing needs investigation. ==="
            fi
