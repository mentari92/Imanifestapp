# ImanifestApp Nginx Config
# imanifestapp.com     → Expo Web App (static SPA)
# api.imanifestapp.com → NestJS API (all backend endpoints)

upstream web {
    server web:80;
}

upstream api {
    server api:3001;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name imanifestapp.com www.imanifestapp.com api.imanifestapp.com;
    return 301 https://$host$request_uri;
}

# ─── Web App: imanifestapp.com ────────────────────────────────
server {
    listen 443 ssl;
    server_name imanifestapp.com www.imanifestapp.com;

    ssl_certificate /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    client_max_body_size 50M;

    # Serve the Expo static web build (SPA)
    location / {
        proxy_pass http://web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ─── API: api.imanifestapp.com ────────────────────────────────
server {
    listen 443 ssl;
    server_name api.imanifestapp.com;

    ssl_certificate /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Max upload size (for voice recordings)
    client_max_body_size 50M;

    location / {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Health check (no logging)
    location /health {
        proxy_pass http://api;
        access_log off;
    }
}