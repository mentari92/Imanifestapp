# ImanifestApp — Production Docker Compose
# Usage: docker compose up -d

services:
  # ─── PostgreSQL Database ──────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-imanifest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-imanifest}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-imanifest}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Redis (Rate Limiting + Caching) ──────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── NestJS API Server ────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
      AUTH_DISABLED: ${AUTH_DISABLED:-false}
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Expo Web App (static, served on host port 8080) ────────
  # nginx master di HOST yang proxy ke sini untuk imanifestapp.com
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        EXPO_PUBLIC_API_URL: https://imanifestapp.com/api
        EXPO_PUBLIC_DEMO_AUTH_MODE: ${EXPO_PUBLIC_DEMO_AUTH_MODE:-false}
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"   # hanya localhost, tidak expose ke internet langsung
    depends_on:
      - api
    networks:
      - default
      - n8n_default

volumes:
  pgdata:
  redisdata:

networks:
  default: {}
  # Caddy (n8n stack) resolves container names from this network
  n8n_default:
    external: true