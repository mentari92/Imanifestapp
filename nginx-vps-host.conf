# ================================================================
# nginx config untuk HOST VPS — bukan Docker
# Letakkan di: /etc/nginx/sites-available/imanifest
# Lalu: sudo ln -s /etc/nginx/sites-available/imanifest /etc/nginx/sites-enabled/
#
# File ini TIDAK mengganggu getdocutrip.com sama sekali.
# getdocutrip.com punya file config sendiri di sites-enabled.
# ================================================================

# ─── imanifestapp.com → Docker web container (port 8080) ─────
server {
    listen 80;
    server_name imanifestapp.com www.imanifestapp.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name imanifestapp.com www.imanifestapp.com;

    ssl_certificate     /etc/letsencrypt/live/imanifestapp.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/imanifestapp.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # /api/* → NestJS (strips /api/ prefix)
    # Required for OAuth callback: /api/auth/callback/qurancom
    # and all frontend API calls from imanifestapp.com
    location /api/ {
        proxy_pass http://127.0.0.1:3001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
    }

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }
}

# ─── api.imanifestapp.com → Docker NestJS (port 3001) ────────
server {
    listen 80;
    server_name api.imanifestapp.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.imanifestapp.com;

    ssl_certificate     /etc/letsencrypt/live/api.imanifestapp.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.imanifestapp.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 86400;
    }
}
